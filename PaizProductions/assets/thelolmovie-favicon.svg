<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- NO background — fully transparent -->

  <!-- Dark cinematic background -->
  <rect x="0" y="0" width="32" height="32" rx="2" fill="#1a0a00"/>

  <!-- Film strip holes top -->
  <rect x="2"  y="1.5" width="3.5" height="2.5" rx="0.5" fill="#2e1500"/>
  <rect x="7"  y="1.5" width="3.5" height="2.5" rx="0.5" fill="#2e1500"/>
  <rect x="12" y="1.5" width="3.5" height="2.5" rx="0.5" fill="#2e1500"/>
  <rect x="17" y="1.5" width="3.5" height="2.5" rx="0.5" fill="#2e1500"/>
  <rect x="22" y="1.5" width="3.5" height="2.5" rx="0.5" fill="#2e1500"/>
  <rect x="26.5" y="1.5" width="3.5" height="2.5" rx="0.5" fill="#2e1500"/>

  <!-- Film strip holes bottom -->
  <rect x="2"  y="28" width="3.5" height="2.5" rx="0.5" fill="#2e1500"/>
  <rect x="7"  y="28" width="3.5" height="2.5" rx="0.5" fill="#2e1500"/>
  <rect x="12" y="28" width="3.5" height="2.5" rx="0.5" fill="#2e1500"/>
  <rect x="17" y="28" width="3.5" height="2.5" rx="0.5" fill="#2e1500"/>
  <rect x="22" y="28" width="3.5" height="2.5" rx="0.5" fill="#2e1500"/>
  <rect x="26.5" y="28" width="3.5" height="2.5" rx="0.5" fill="#2e1500"/>

  <!-- "LoL" bold text, red-orange gradient effect -->
  <text x="16" y="21"
        text-anchor="middle"
        font-family="'Arial Black', Arial, sans-serif"
        font-weight="900"
        font-size="15"
        letter-spacing="-0.5"
        fill="#c0391a">LoL</text>

  <!-- Thin yellow underline -->
  <rect x="5" y="23" width="22" height="1.5" fill="#f5c518" opacity="0.9"/>
</svg>
